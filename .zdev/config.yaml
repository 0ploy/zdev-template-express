version: 1
name: ${PROJECTDIR}
domain: ${PROJECTNAME}.${ZDEV_DOMAIN}

info: |
  ## ${PROJECTNAME}

  Express.js application.

  Run `zdev setup` to install dependencies.

shared:
  router: true

services:
  app:
    image: node:22-alpine
    command: >-
      sh -c "corepack enable &&
      if [ ! -f .setup-complete ]; then
        echo 'Waiting for setup... Run: zdev setup';
        while [ ! -f .setup-complete ]; do sleep 2; done;
      fi;
      pnpm install && exec pnpm start"
    working_dir: /app
    volumes:
      - ${PROJECTPATH}:/app
    environment:
      NODE_ENV: development
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PORT: "3000"
    routing:
      port: 3000

mutagen:
  ignore:
    - node_modules
    - .pnpm-store
    - .zdev
    - .setup-complete
